name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore GitHubProjectConnection.slnx

      - name: Build (warnings as errors)
        run: dotnet build GitHubProjectConnection.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test GitHubProjectConnection.slnx --configuration Release --no-build --verbosity normal

      - name: Verify formatting
        run: dotnet format GitHubProjectConnection.slnx --verify-no-changes
